  .bg-scrim-corner{ position:absolute; left:0; bottom:0; z-index:0; pointer-events:none;
    width:min(56vw,760px); height:220px;
    background:linear-gradient(0deg, rgba(0,0,0,.4) 0%, rgba(0,0,0,.16) 55%, rgba(0,0,0,0) 100%); }

  .bg-scrim-hero{ position:absolute; left:0; top:0; bottom:0; z-index:0; pointer-events:none;
    width:min(58vw,820px);
    background:radial-gradient(ellipse 60% 42% at 30% 50%, rgba(0,0,0,.34) 0%, rgba(0,0,0,.16) 45%, rgba(0,0,0,0) 75%); }

  .brand-strip{ position:absolute; left:6vw; bottom:36px; z-index:1;
    display:flex; align-items:center; gap:18px; }
  .brand-strip img{ height:14px; width:auto; display:block; filter:drop-shadow(0 1px 3px rgba(0,0,0,.35)); }
  .brand-strip .sep{ color:rgba(255,255,255,.75); font-size:14px; }
  .brand-strip .txt{ color:#fff; font-size:14px; letter-spacing:.14em; font-weight:500;
    text-shadow:0 1px 3px rgba(0,0,0,.35); }
  @media(max-width:900px){
    .brand-strip{ display:none; }
  }

  .wrap{ position:relative; z-index:1; width:100%; min-height:100vh; display:flex; align-items:stretch; justify-content:space-between;
    gap:40px; padding:0 6vw; }

  .hero-left{ flex:1; min-width:0; align-self:flex-start; margin-top:25vh;
    animation:heroUp .9s .08s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes heroUp{ from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none} }
  .hero-eyebrow{ font-size:12.5px; font-weight:700; letter-spacing:.24em; color:var(--blue);
    text-transform:uppercase; margin:0 0 14px; text-shadow:0 1px 3px rgba(255,255,255,.4); }
  .hero-title{ font-size:clamp(40px,5.4vw,68px); font-weight:800; line-height:1.08; letter-spacing:-.01em; margin:0; }
  .hero-title .b{ color:var(--blue); }
  .hero-title .k{ color:var(--ink); }
  .hero-rule{ width:56px; height:4px; background:var(--blue); border-radius:2px; margin-top:20px; }

  .card-col{ flex:0 0 auto; width:440px; max-width:92vw; display:flex; align-items:center; padding:6vh 0; }
  .card{ width:100%; min-height:600px; display:flex; flex-direction:column;
    background:var(--card); backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid rgba(255,255,255,.6); border-radius:28px;
    box-shadow:0 30px 70px rgba(15,30,60,.25); padding:48px 40px 36px;
    animation:cardIn .9s .12s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes cardIn{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }

  .card-logo{ display:flex; justify-content:center; }
  .card-logo img{ height:30px; width:auto; display:block; }
  .card-rule{ width:36px; height:3px; background:var(--blue); border-radius:2px; margin:18px auto 14px; }
  .card-tag{ text-align:center; font-size:12.5px; font-weight:700; letter-spacing:.22em; color:var(--blue); margin:0 0 34px; }

  .field{ margin-bottom:16px; }
  .inp{ position:relative; display:flex; align-items:center; }
  .inp .ic{ position:absolute; left:16px; width:18px; height:18px; fill:none; stroke:var(--muted-2);
    stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; pointer-events:none; }
  input{ width:100%; height:54px; background:var(--field); border:1px solid var(--field-line);
    border-radius:14px; color:var(--ink); font-size:15px; padding:0 16px 0 46px; outline:none;
    transition:border-color .15s, box-shadow .15s, background .15s; }
  input::placeholder{ color:var(--muted-2); font-weight:400; }
  input:focus{ border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-ring); }
  #pw{ padding-right:50px; }
  .pwtoggle{ position:absolute; right:14px; background:none; border:0; color:var(--muted-2); cursor:pointer; padding:6px;
    display:flex; align-items:center; }
  .pwtoggle:hover{ color:var(--muted); }
  .pwtoggle .eye{ width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

  .err{ display:none; text-align:left; background:var(--red-bg); border:1px solid var(--red-line);
    color:var(--red); font-size:12.5px; padding:10px 13px; border-radius:10px; margin-bottom:14px; line-height:1.5; }

  #go{ position:relative; width:100%; height:54px; border:0; border-radius:14px; cursor:pointer; color:#fff;
    font-size:16px; font-weight:700; letter-spacing:.01em; background:var(--blue);
    box-shadow:0 12px 26px rgba(26,86,199,.32); transition:background-color .2s ease, transform .15s; margin-top:8px;
    display:flex; align-items:center; justify-content:center; }
  #go:hover{ background-color:var(--blue-dark); }
  #go:active{ transform:scale(.99); }
  #go .arr{ position:absolute; right:20px; width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2;
    stroke-linecap:round; stroke-linejoin:round; }
  .stat{ text-align:center; color:var(--muted); font-size:11.5px; min-height:16px; margin-top:10px; }

  .divider{ display:flex; align-items:center; gap:14px; margin:22px 0 16px; color:var(--muted-2); }
  .divider::before,.divider::after{ content:""; flex:1; height:1px; background:var(--line); }
  .divider span{ font-size:13px; }

  .forgot{ display:block; width:100%; text-align:center; border:0; background:none; cursor:pointer;
    font-size:13px; color:var(--blue); font-weight:500; }
  .forgot:hover{ color:var(--blue-dark); }

  .foot{ margin-top:auto; padding-top:28px; text-align:center; color:var(--muted-2); font-size:11.5px; }

  @media(max-width:900px){
    .wrap{ flex-direction:column; justify-content:center; padding:36px 24px; gap:28px; text-align:center; }
    .hero-left{ order:1; }
    .hero-rule{ margin-left:auto; margin-right:auto; }
    .card-col{ order:2; width:100%; padding:0 0 24px; }
  }
  @media(max-width:480px){
    .card{ padding:36px 26px 28px; min-height:auto; }
  }

  /* ===== 進入系統後：整頁內嵌，網址不變 ===== */
  #appView{ display:none; position:fixed; inset:0; background:#0b0b0d; }
  #frame{ position:absolute; inset:0; width:100%; height:100%; border:0; }
  #frameLoading{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#9a9a9a; font-size:15px; background:#0b0b0d; }
  #logout{ position:fixed; top:12px; right:24px; z-index:2147483647; cursor:pointer;
    background:rgba(20,20,20,.72); color:#eee; border:1px solid rgba(255,255,255,.25);
    border-radius:20px; padding:6px 13px; font-size:12.5px; font-weight:700; backdrop-filter:blur(3px); }
  #logout:hover{ background:rgba(20,20,20,.92); }
</style>
</head>

let camperCodeMap=new Map();   // 改裝：全碼(小寫) → 業務代號
let loaded=false;
let vipRoutes=[{ltr:"c",dest:"caterham"},{ltr:"s",dest:"sunlight"},{ltr:"m",dest:"camper"}];   // 開頭字母→目的地；後台設定會覆蓋

const $=id=>document.getElementById(id);
function showErr(m){ const e=$("err"); e.textContent=m||""; e.style.display=m?"block":"none"; }
function setStat(m){ const s=$("stat"); if(s) s.textContent=m||""; }
function targetOf(sys){ return sys==="camper"?CAMP_URL:CAT_URL; }

function readHandoff(){
  try{ const raw=sessionStorage.getItem(HKEY); if(!raw)return null; const h=JSON.parse(raw);
    if(!h||!h.sys)return null; if(h.ts&&(Date.now()-h.ts>86400000))return null; return h; }catch(e){ return null; }
}
function showApp(url){
  $("frameLoading").style.display="flex";
  $("loginView").style.display="none";
  $("appView").style.display="block";
  const f=$("frame"); if(f.getAttribute("src")!==url) f.setAttribute("src",url);
}
function backToLogin(){
  try{ sessionStorage.removeItem(HKEY); sessionStorage.removeItem("oma_vip_logged"); }catch(e){}
  const f=$("frame"); if(f) f.setAttribute("src","about:blank");
  $("appView").style.display="none";
  $("loginView").style.display="flex";
  $("pw").value=""; showErr(""); setStat(""); $("name").focus();
}

setStat("系統準備中…");
(async function loadCodes(){
  try{
    const catDb=getFirestore(initializeApp(catCfg,"cat"));
    let prefix="2026";
    try{ const st=await getDoc(doc(catDb,"appdata","ctm_settings_v1")); if(st.exists()){ const s=JSON.parse(st.data().v||"{}"); if(s&&s.vipPrefix&&String(s.vipPrefix).trim()) prefix=String(s.vipPrefix).trim(); if(s&&Array.isArray(s.vipRoutes)&&s.vipRoutes.length) vipRoutes=s.vipRoutes; } }catch(e){}
    try{ const ac=await getDoc(doc(catDb,"appdata","ctm_accounts_v2")); if(ac.exists()){ const a=JSON.parse(ac.data().v||"{}"); (a.sales||[]).forEach(s=>{ if(s.shared)return; const code=((s.vipPass&&String(s.vipPass).trim())||(prefix+s.u)).toLowerCase(); if(code) caterhamCodes.add(code); }); } }catch(e){}

    const campDb=getFirestore(initializeApp(campCfg,"camp"));
    try{ const cf=await getDoc(doc(campDb,"settings","config")); if(cf.exists()){ const db=cf.data()||{}; const base=(db.sales&&db.sales.custBase)||"2026"; ((db.sales&&db.sales.list)||[]).forEach(r=>{ const code=((r.code&&String(r.code).trim())||(base+String(r.key||"").toLowerCase())).toLowerCase(); if(code) camperCodeMap.set(code,r.key); }); } }catch(e){}

    loaded=(caterhamCodes.size>0 || camperCodeMap.size>0);
  }catch(e){ console.warn("載入代碼失敗",e); }
  setStat("");
})();

function go(){
  showErr(""); setStat("");
  const name=($("name").value||"").trim();
  const raw =($("pw").value||"").trim();
  if(!name){ showErr("請輸入您的稱呼"); $("name").focus(); return; }
  if(!raw){ showErr("請輸入密碼"); $("pw").focus(); return; }
  const pw=raw.toLowerCase();
  const letters=vipRoutes.map(r=>String(r.ltr||"").toLowerCase()).filter(Boolean);
  const lettersTxt=letters.map(l=>l.toUpperCase()).join("／")||"C／S／M";

  // 忘了在最前面加字母（整組剛好等於某個 VIP 密碼）
  if(loaded && (caterhamCodes.has(pw) || camperCodeMap.has(pw))){
    showErr("請在密碼最前面加上字母："+lettersTxt); return;
  }
  const letter=pw.slice(0,1), base=pw.slice(1);
  const route=vipRoutes.find(r=>String(r.ltr||"").toLowerCase()===letter);
  if(!route){ showErr("密碼開頭的字母不正確（應為 "+lettersTxt+"）"); return; }

  let sys, brand=null, rep=null;
  if(route.dest==="camper"){
    if(loaded && !camperCodeMap.has(base)){ showErr("密碼不正確，請向您的業務專員確認"); return; }
    sys="camper"; rep=camperCodeMap.get(base)||null;
  } else {   // caterham / sunlight（同一支程式，差在鎖哪個品牌）
    if(loaded && !caterhamCodes.has(base)){ showErr("密碼不正確，請向您的業務專員確認"); return; }
    sys="caterham"; brand=(route.dest==="sunlight")?"sunlight":"caterham";
  }

  const handoff={ sys:sys, pass:base, name:name, brand:brand, rep:rep, ts:Date.now() };
  try{ sessionStorage.setItem(HKEY, JSON.stringify(handoff)); }
  catch(e){ showErr("此瀏覽器不支援，請改用 Safari 或 Chrome"); return; }
  showApp(targetOf(sys));   // 同一頁內嵌顯示，網址不變
}

$("go").addEventListener("click", go);
["name","pw"].forEach(id=>$(id).addEventListener("keydown", e=>{ if(e.key==="Enter") go(); }));
$("logout").addEventListener("click", backToLogin);
$("frame").addEventListener("load", ()=>{ const l=$("frameLoading"); if(l) l.style.display="none"; });

/* 重新整理仍停在同一頁：已有有效交接資料就直接顯示對應系統，不用重打 */
(function(){
  const h=readHandoff();
  if(h){ showApp(targetOf(h.sys)); }
  else { $("loginView").style.display="flex"; $("name").focus(); }
})();
</script>
</body>
</html>
