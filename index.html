<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>歐馬企業 · VIP 客戶入口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#0a0b0e; --bg-2:#121218;
    --line:rgba(255,255,255,.08); --line-soft:rgba(255,255,255,.05);
    --ink:#f1eee7; --muted:#948d82; --muted-2:#68635b;
    --gold:#c7a668; --gold-soft:rgba(199,166,104,.14);
    --red:#c98b7d;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg-1); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased; }

  /* ===== 登入畫面：分欄式，安靜、克制 ===== */
  #loginView{ position:relative; overflow:hidden; min-height:100%;
    display:flex; flex-direction:column; padding:40px 56px; animation:pageIn 1s ease both; }
  @keyframes pageIn{ from{opacity:0} to{opacity:1} }

  .bg{ position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 12% 8%, rgba(70,84,110,.13), transparent 62%),
      radial-gradient(ellipse 55% 48% at 88% 96%, rgba(120,92,54,.10), transparent 62%),
      linear-gradient(160deg, #0a0b0e 0%, #0d0d10 46%, #100f0c 100%); }
  #loginView > *:not(.bg){ position:relative; z-index:1; }

  /* 頂列：僅品牌 */
  .topbar2{ display:flex; align-items:center; justify-content:space-between; }
  .logo img{ height:24px; width:auto; display:block; filter:brightness(0) invert(1); opacity:.9; }

  /* 主要區：左品牌氛圍 / 右登入卡 */
  .mainrow{ flex:1; display:flex; align-items:center; gap:80px; }
  .hero-col{ flex:1.1; min-width:0; display:flex; flex-direction:column; justify-content:center;
    animation:heroUp 1s .1s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes heroUp{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }

  .eyebrow{ font-size:11.5px; letter-spacing:.32em; color:var(--gold); text-transform:uppercase;
    font-weight:600; margin:0 0 22px; }
  .hero-title{ font-family:"Cormorant Garamond",Georgia,serif; font-weight:500; font-style:italic;
    font-size:clamp(36px,4.2vw,56px); line-height:1.16; letter-spacing:.005em; color:var(--ink); margin:0 0 20px; }
  .hero-sub{ font-size:15px; line-height:1.85; color:var(--muted); max-width:360px; font-weight:400; }

  /* 登入卡：深色霧面，細邊框，柔和陰影 */
  .card{ position:relative; flex:0 0 400px; max-width:calc(100% - 20px);
    background:rgba(255,255,255,.025); border:1px solid var(--line); border-radius:16px;
    box-shadow:0 24px 60px rgba(0,0,0,.35); padding:44px 38px;
    animation:cardIn 1s .15s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes cardIn{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }

  .card-title{ font-family:"Cormorant Garamond",Georgia,serif; font-size:24px; font-weight:600;
    letter-spacing:.03em; color:var(--ink); margin:0 0 8px; }
  .card-desc{ font-size:13px; color:var(--muted); margin:0 0 32px; }

  .field{ text-align:left; margin-bottom:18px; }
  label{ display:block; font-size:11.5px; letter-spacing:.09em; color:var(--muted);
    text-transform:uppercase; margin:0 0 8px; }
  .inp{ position:relative; display:flex; align-items:center; }
  .inp .ic{ position:absolute; left:16px; width:16px; height:16px; fill:none; stroke:var(--muted);
    stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; opacity:.7; pointer-events:none; }
  input{ width:100%; height:50px; background:rgba(255,255,255,.02); border:1px solid var(--line);
    border-radius:8px; color:var(--ink); font-size:14.5px; padding:0 16px 0 44px; outline:none;
    transition:border-color .2s, box-shadow .2s; }
  input::placeholder{ color:var(--muted-2); }
  input:focus{ border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-soft); }
  #pw{ padding-right:64px; }
  .pwtoggle{ position:absolute; right:12px; background:none; border:0; color:var(--muted);
    font-size:11.5px; letter-spacing:.03em; cursor:pointer; padding:8px 4px; }
  .pwtoggle:hover{ color:var(--gold); }

  .err{ display:none; text-align:left; background:rgba(201,139,125,.08); border:1px solid rgba(201,139,125,.3);
    color:var(--red); font-size:12.5px; padding:10px 13px; border-radius:8px; margin-bottom:16px; line-height:1.5; }

  #go{ width:100%; height:50px; border:0; border-radius:8px; cursor:pointer; color:#211a0f;
    font-size:13.5px; font-weight:600; letter-spacing:.16em; background:var(--gold);
    box-shadow:0 10px 24px rgba(0,0,0,.25); transition:filter .2s, transform .15s; margin-top:6px; }
  #go:hover{ filter:brightness(1.06); }
  #go:active{ transform:translateY(1px); }
  .stat{ text-align:center; color:var(--muted); font-size:11.5px; min-height:16px; margin-top:12px; }

  .forgot{ display:block; width:100%; text-align:center; margin-top:22px; padding-top:20px;
    border:0; border-top:1px solid var(--line-soft); background:none; cursor:pointer;
    font-size:12px; color:var(--muted); }
  .forgot:hover{ color:var(--gold); }

  @media(max-width:1024px){
    #loginView{ padding:30px 30px 34px; }
    .mainrow{ flex-direction:column; justify-content:flex-start; gap:40px; padding-top:16px; }
    .hero-col{ text-align:center; align-items:center; }
    .hero-sub{ max-width:420px; }
    .card{ flex:0 0 auto; width:100%; max-width:420px; }
  }
  @media(max-width:560px){
    #loginView{ padding:22px 20px 26px; }
    .hero-title{ font-size:clamp(30px,8vw,40px); }
    .card{ padding:34px 24px; }
  }

  /* ===== 進入系統後：整頁內嵌，網址不變 ===== */
  #appView{ display:none; position:fixed; inset:0; background:#0b0b0d; }
  #frame{ position:absolute; inset:0; width:100%; height:100%; border:0; }
  #frameLoading{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#9a9a9a; font-size:15px; background:#0b0b0d; }
  #logout{ position:fixed; top:12px; right:24px; z-index:2147483647; cursor:pointer;
    background:rgba(20,20,20,.72); color:#eee; border:1px solid rgba(255,255,255,.25);
    border-radius:20px; padding:6px 13px; font-size:12.5px; font-weight:700; backdrop-filter:blur(3px); }
  #logout:hover{ background:rgba(20,20,20,.92); }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* 目標系統（皆為 oma2026.github.io 同網域）。入口頁部署在同網域時，內嵌 + 自動登入才會生效 */
const CAT_URL ="https://oma2026.github.io/caterhamsunlight5/";
const CAMP_URL="https://oma2026.github.io/camperconversionquote4/";
const HKEY="oma_vip_handoff";

const catCfg={apiKey:"AIzaSyClVmJRvr-gLYPkkueHLt9-eC1HmmZUF7A",authDomain:"caterhamsunlight-bdff0.firebaseapp.com",projectId:"caterhamsunlight-bdff0",storageBucket:"caterhamsunlight-bdff0.firebasestorage.app",messagingSenderId:"356604072691",appId:"1:356604072691:web:ed51ec6efa44aa8b129d86"};
const campCfg={apiKey:"AIzaSyA5VM_w5h7-IqHbHMNkSYsqpHweeicu30s",authDomain:"camperconversionquote.firebaseapp.com",projectId:"camperconversionquote",storageBucket:"camperconversionquote.firebasestorage.app",messagingSenderId:"725396550873",appId:"1:725396550873:web:50057d8dfc06718d72bac8"};

let caterhamCodes=new Set();   // Caterham/Sunlight 有效客戶全碼（小寫）
let camperCodeMap=new Map();   // 改裝：全碼(小寫) → 業務代號
let loaded=false;
let vipRoutes=[{ltr:"c",dest:"caterham"},{ltr:"s",dest:"sunlight"},{ltr:"m",dest:"camper"}];   // 開頭字母→目的地；後台設定會覆蓋

const $=id=>document.getElementById(id);
function showErr(m){ const e=$("err"); e.textContent=m||""; e.style.display=m?"block":"none"; }
function setStat(m){ const s=$("stat"); if(s) s.textContent=m||""; }
function targetOf(sys){ return sys==="camper"?CAMP_URL:CAT_URL; }

function readHandoff(){
  try{ const raw=sessionStorage.getItem(HKEY); if(!raw)return null; const h=JSON.parse(raw);
    if(!h||!h.sys)return null; if(h.ts&&(Date.now()-h.ts>86400000))return null; return h; }catch(e){ return null; }
}
function showApp(url){
  $("frameLoading").style.display="flex";
  $("loginView").style.display="none";
  $("appView").style.display="block";
  const f=$("frame"); if(f.getAttribute("src")!==url) f.setAttribute("src",url);
}
function backToLogin(){
  try{ sessionStorage.removeItem(HKEY); sessionStorage.removeItem("oma_vip_logged"); }catch(e){}
  const f=$("frame"); if(f) f.setAttribute("src","about:blank");
  $("appView").style.display="none";
  $("loginView").style.display="flex";
  $("pw").value=""; showErr(""); setStat(""); $("name").focus();
}

setStat("系統準備中…");
(async function loadCodes(){
  try{
    const catDb=getFirestore(initializeApp(catCfg,"cat"));
    let prefix="2026";
    try{ const st=await getDoc(doc(catDb,"appdata","ctm_settings_v1")); if(st.exists()){ const s=JSON.parse(st.data().v||"{}"); if(s&&s.vipPrefix&&String(s.vipPrefix).trim()) prefix=String(s.vipPrefix).trim(); if(s&&Array.isArray(s.vipRoutes)&&s.vipRoutes.length) vipRoutes=s.vipRoutes; } }catch(e){}
    try{ const ac=await getDoc(doc(catDb,"appdata","ctm_accounts_v2")); if(ac.exists()){ const a=JSON.parse(ac.data().v||"{}"); (a.sales||[]).forEach(s=>{ if(s.shared)return; const code=((s.vipPass&&String(s.vipPass).trim())||(prefix+s.u)).toLowerCase(); if(code) caterhamCodes.add(code); }); } }catch(e){}

    const campDb=getFirestore(initializeApp(campCfg,"camp"));
    try{ const cf=await getDoc(doc(campDb,"settings","config")); if(cf.exists()){ const db=cf.data()||{}; const base=(db.sales&&db.sales.custBase)||"2026"; ((db.sales&&db.sales.list)||[]).forEach(r=>{ const code=((r.code&&String(r.code).trim())||(base+String(r.key||"").toLowerCase())).toLowerCase(); if(code) camperCodeMap.set(code,r.key); }); } }catch(e){}

    loaded=(caterhamCodes.size>0 || camperCodeMap.size>0);
  }catch(e){ console.warn("載入代碼失敗",e); }
  setStat("");
})();

function go(){
  showErr(""); setStat("");
  const name=($("name").value||"").trim();
  const raw =($("pw").value||"").trim();
  if(!name){ showErr("請輸入您的稱呼"); $("name").focus(); return; }
  if(!raw){ showErr("請輸入密碼"); $("pw").focus(); return; }
  const pw=raw.toLowerCase();
  const letters=vipRoutes.map(r=>String(r.ltr||"").toLowerCase()).filter(Boolean);
  const lettersTxt=letters.map(l=>l.toUpperCase()).join("／")||"C／S／M";

  // 忘了在最前面加字母（整組剛好等於某個 VIP 密碼）
  if(loaded && (caterhamCodes.has(pw) || camperCodeMap.has(pw))){
    showErr("請在密碼最前面加上字母："+lettersTxt); return;
  }
  const letter=pw.slice(0,1), base=pw.slice(1);
  const route=vipRoutes.find(r=>String(r.ltr||"").toLowerCase()===letter);
  if(!route){ showErr("密碼開頭的字母不正確（應為 "+lettersTxt+"）"); return; }

  let sys, brand=null, rep=null;
  if(route.dest==="camper"){
    if(loaded && !camperCodeMap.has(base)){ showErr("密碼不正確，請向您的業務專員確認"); return; }
    sys="camper"; rep=camperCodeMap.get(base)||null;
  } else {   // caterham / sunlight（同一支程式，差在鎖哪個品牌）
    if(loaded && !caterhamCodes.has(base)){ showErr("密碼不正確，請向您的業務專員確認"); return; }
    sys="caterham"; brand=(route.dest==="sunlight")?"sunlight":"caterham";
  }

  const handoff={ sys:sys, pass:base, name:name, brand:brand, rep:rep, ts:Date.now() };
  try{ sessionStorage.setItem(HKEY, JSON.stringify(handoff)); }
  catch(e){ showErr("此瀏覽器不支援，請改用 Safari 或 Chrome"); return; }
  showApp(targetOf(sys));   // 同一頁內嵌顯示，網址不變
}

$("go").addEventListener("click", go);
["name","pw"].forEach(id=>$(id).addEventListener("keydown", e=>{ if(e.key==="Enter") go(); }));
$("logout").addEventListener("click", backToLogin);
$("frame").addEventListener("load", ()=>{ const l=$("frameLoading"); if(l) l.style.display="none"; });

/* 重新整理仍停在同一頁：已有有效交接資料就直接顯示對應系統，不用重打 */
(function(){
  const h=readHandoff();
  if(h){ showApp(targetOf(h.sys)); }
  else { $("loginView").style.display="flex"; $("name").focus(); }
})();
</script>
</body>
</html>
